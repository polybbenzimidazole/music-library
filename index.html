<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14110D">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;600;700&family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14110D;
    --surface:#1D1912;
    --surface-2:#262019;
    --accent:#D4A72C;
    --accent-dim:#8A6F1F;
    --text:#F3EDE0;
    --text-dim:#9C9184;
    --ghost-border:#4A4335;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Roboto',system-ui,sans-serif;
    min-height:100vh;
  }

  header{
    position:sticky;
    top:0;
    z-index:10;
    background:linear-gradient(var(--bg) 80%, transparent);
    padding:24px 20px 16px;
    display:flex;
    align-items:center;
    gap:16px;
    flex-wrap:wrap;
  }
  h1{
    font-family:'Roboto Condensed',sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin:0;
    white-space:nowrap;
  }
  .search{
    flex:1;
    min-width:160px;
    background:var(--surface);
    border:1px solid var(--surface-2);
    border-radius:8px;
    padding:10px 14px;
    color:var(--text);
    font-family:'Roboto',sans-serif;
    font-size:14px;
  }
  .search::placeholder{ color:var(--text-dim); }
  .search:focus{ outline:none; border-color:var(--accent-dim); }

  main{
    padding:8px 20px 100px;
    max-width:1200px;
    margin:0 auto;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:20px;
  }
  @media (max-width: 600px){
    .grid{
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
    }
    .tag{ font-size:8px; padding:2px 5px; }
    .album{ font-size:11.5px; }
    .artist{ font-size:10.5px; }
  }

  .card{
    display:flex;
    flex-direction:column;
    gap:8px;
    cursor:default;
  }
  .cover-wrap{
    position:relative;
    aspect-ratio:1/1;
    border-radius:6px;
    overflow:hidden;
    background:var(--surface);
    border:1px solid var(--surface-2);
    transition:transform 0.15s ease;
  }
  .card:hover .cover-wrap{ transform:translateY(-2px); }
  .cover-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  /* not-downloaded = ghost sleeve: dashed border, desaturated, empty */
  .card.ghost .cover-wrap{
    border:1.5px dashed var(--ghost-border);
    background:var(--surface);
  }
  .card.ghost .cover-wrap img{
    filter:grayscale(85%) brightness(0.55);
    opacity:0.75;
  }
  .tag{
    position:absolute;
    top:6px;
    left:6px;
    font-family:'Roboto Condensed',sans-serif;
    font-size:9px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:3px 7px;
    border-radius:4px;
    background:rgba(20,17,13,0.85);
    color:var(--accent);
    border:1px solid var(--accent-dim);
  }
  .tag.wishlist{
    color:var(--text-dim);
    border-color:var(--ghost-border);
  }

  .meta{ padding:0 2px; }
  .album{
    font-family:'Roboto Condensed',sans-serif;
    font-weight:600;
    font-size:14px;
    line-height:1.25;
    margin:0 0 2px;
  }
  .card.ghost .album{ color:var(--text-dim); }
  .artist{
    font-size:12.5px;
    color:var(--text-dim);
    margin:0;
  }
  .year{
    font-size:11px;
    color:var(--ghost-border);
    margin:2px 0 0;
  }

  .fab{
    position:fixed;
    right:24px;
    bottom:24px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:var(--accent);
    color:var(--bg);
    border:none;
    font-size:28px;
    font-weight:600;
    line-height:1;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,0.4);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .fab:hover{ background:#e6bb35; }

  .empty{
    text-align:center;
    color:var(--text-dim);
    padding:60px 20px;
    font-size:14px;
  }

  /* --- Launcher (add-album search) --- */
  .launcher-overlay{
    position:fixed;
    inset:0;
    background:rgba(10,8,6,0.6);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    z-index:100;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:12vh;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.15s ease;
  }
  .launcher-overlay.open{
    opacity:1;
    pointer-events:auto;
  }
  .launcher-box{
    width:min(520px, 90vw);
    background:var(--surface);
    border:1px solid var(--surface-2);
    border-radius:12px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    overflow:hidden;
    transform:translateY(-8px);
    transition:transform 0.15s ease;
  }
  .launcher-overlay.open .launcher-box{ transform:translateY(0); }
  .launcher-input{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--surface-2);
    color:var(--text);
    font-family:'Roboto',sans-serif;
    font-size:16px;
    padding:16px 18px;
  }
  .launcher-input::placeholder{ color:var(--text-dim); }
  .launcher-input:focus{ outline:none; }

  .launcher-results{
    max-height:50vh;
    overflow-y:auto;
  }
  .launcher-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 14px;
    cursor:pointer;
  }
  .launcher-item img{
    width:42px;
    height:42px;
    border-radius:4px;
    object-fit:cover;
    flex-shrink:0;
    background:var(--surface-2);
  }
  .launcher-item-text{ min-width:0; }
  .launcher-item .li-album{
    font-family:'Roboto Condensed',sans-serif;
    font-weight:600;
    font-size:13.5px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .launcher-item .li-artist{
    font-size:12px;
    color:var(--text-dim);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .launcher-item:hover,
  .launcher-item.active{
    background:var(--surface-2);
  }
  .launcher-hint{
    padding:12px 14px;
    font-size:12px;
    color:var(--text-dim);
    text-align:center;
  }
</style>
</head>
<body>

<header>
  <h1>Library</h1>
  <input class="search" type="text" placeholder="Search artist or album..." id="searchInput">
</header>

<main>
  <div class="grid" id="grid"></div>
  <p class="empty" id="emptyState" style="display:none;">No albums match your search.</p>
</main>

<button class="fab" id="addBtn" title="Add album">+</button>

<div class="launcher-overlay" id="launcherOverlay">
  <div class="launcher-box">
    <input class="launcher-input" id="launcherInput" type="text"
           placeholder="Search for an album to add..." autocomplete="off">
    <div class="launcher-results" id="launcherResults"></div>
  </div>
</div>

<script>
  // --- Test data (will be replaced by a live fetch in a later step) ---
  const libraryData = [
    {
      artist: "Terrorizer",
      album: "World Downfall",
      cover_art_url: "https://is1-ssl.mzstatic.com/image/thumb/Music124/v4/58/8a/d1/588ad105-8bc0-b7ff-33dc-269111326e4b/s05.koyqonod.tif/1000x1000bb.jpg",
      downloaded: true,
      year: null
    },
    {
      artist: "The Suicide Machines",
      album: "Destruction By Definition",
      cover_art_url: "https://lastfm.freetls.fastly.net/i/u/300x300/25609563cece4084a5a52c8aa559907f.jpg",
      downloaded: true,
      year: null
    },
    {
      artist: "underscores",
      album: "U",
      cover_art_url: "https://is1-ssl.mzstatic.com/image/thumb/Music211/v4/8c/a4/b1/8ca4b15b-9ea9-b43a-0c1e-0748f0f3bb80/810090098739_Cover.jpg/1000x1000bb.jpg",
      downloaded: true,
      year: null
    }
  ];

  function renderGrid(data){
    const grid = document.getElementById('grid');
    const empty = document.getElementById('emptyState');
    grid.innerHTML = '';

    if(data.length === 0){
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    data.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card' + (item.downloaded ? '' : ' ghost');

      const coverWrap = document.createElement('div');
      coverWrap.className = 'cover-wrap';

      const img = document.createElement('img');
      img.src = item.cover_art_url;
      img.alt = item.album + ' cover';
      img.loading = 'lazy';
      coverWrap.appendChild(img);

      const tag = document.createElement('span');
      tag.className = 'tag' + (item.downloaded ? '' : ' wishlist');
      tag.textContent = item.downloaded ? 'Downloaded' : 'Wishlist';
      coverWrap.appendChild(tag);

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.innerHTML = `
        <p class="album">${escapeHtml(item.album)}</p>
        <p class="artist">${escapeHtml(item.artist)}</p>
        ${item.year ? `<p class="year">${item.year}</p>` : ''}
      `;

      card.appendChild(coverWrap);
      card.appendChild(meta);
      grid.appendChild(card);
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Basic client-side search/filter (wired now against static data;
  // will filter against live data once fetch is added)
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase().trim();
    const filtered = libraryData.filter(item =>
      item.artist.toLowerCase().includes(q) ||
      item.album.toLowerCase().includes(q)
    );
    renderGrid(filtered);
  });

  // --- Launcher: search iTunes to pick an album to add ---
  const overlay = document.getElementById('launcherOverlay');
  const launcherInput = document.getElementById('launcherInput');
  const launcherResults = document.getElementById('launcherResults');

  let itunesResults = [];
  let activeIndex = -1;
  let debounceTimer = null;

  function openLauncher(){
    overlay.classList.add('open');
    launcherInput.value = '';
    launcherResults.innerHTML = '';
    itunesResults = [];
    activeIndex = -1;
    setTimeout(() => launcherInput.focus(), 50);
  }

  function closeLauncher(){
    overlay.classList.remove('open');
  }

  document.getElementById('addBtn').addEventListener('click', openLauncher);

  overlay.addEventListener('click', (e) => {
    if(e.target === overlay) closeLauncher();
  });

  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && overlay.classList.contains('open')) closeLauncher();
  });

  launcherInput.addEventListener('input', (e) => {
    const query = e.target.value.trim();
    clearTimeout(debounceTimer);

    if(query.length === 0){
      launcherResults.innerHTML = '';
      itunesResults = [];
      activeIndex = -1;
      return;
    }

    debounceTimer = setTimeout(() => searchItunes(query), 300);
  });

  launcherInput.addEventListener('keydown', (e) => {
    if(itunesResults.length === 0) return;

    if(e.key === 'ArrowDown'){
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, itunesResults.length - 1);
      highlightActive();
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      highlightActive();
    } else if(e.key === 'Enter' && activeIndex >= 0){
      e.preventDefault();
      selectAlbum(itunesResults[activeIndex]);
    }
  });

  async function searchItunes(query){
    launcherResults.innerHTML = '<p class="launcher-hint">Searching...</p>';
    try{
      const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=8`;
      const res = await fetch(url);
      const data = await res.json();
      itunesResults = data.results || [];
      activeIndex = -1;
      renderLauncherResults();
    }catch(err){
      launcherResults.innerHTML = '<p class="launcher-hint">Search failed. Check your connection.</p>';
    }
  }

  function renderLauncherResults(){
    if(itunesResults.length === 0){
      launcherResults.innerHTML = '<p class="launcher-hint">No matches found.</p>';
      return;
    }
    launcherResults.innerHTML = '';
    itunesResults.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'launcher-item';
      row.innerHTML = `
        <img src="${item.artworkUrl100}" alt="">
        <div class="launcher-item-text">
          <p class="li-album">${escapeHtml(item.collectionName)}</p>
          <p class="li-artist">${escapeHtml(item.artistName)}</p>
        </div>
      `;
      row.addEventListener('click', () => selectAlbum(item));
      row.addEventListener('mouseenter', () => { activeIndex = i; highlightActive(); });
      launcherResults.appendChild(row);
    });
  }

  function highlightActive(){
    [...launcherResults.children].forEach((el, i) => {
      el.classList.toggle('active', i === activeIndex);
    });
  }

  function selectAlbum(item){
    // Selection is wired up; sending it to the library (POST) is the next step.
    console.log('Selected album:', item.artistName, '-', item.collectionName);
    closeLauncher();
  }

  renderGrid(libraryData);
</script>

</body>
</html>
