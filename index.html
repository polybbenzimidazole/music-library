<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#14110D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Library">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;600;700&family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14110D;
    --surface:#1D1912;
    --surface-2:#262019;
    --accent:#D4A72C;
    --accent-dim:#8A6F1F;
    --text:#F3EDE0;
    --text-dim:#9C9184;
    --ghost-border:#4A4335;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Roboto',system-ui,sans-serif;
    min-height:100vh;
  }

  header{
    position:sticky;
    top:0;
    z-index:10;
    background:linear-gradient(var(--bg) 80%, transparent);
    padding:24px 20px 16px;
    display:flex;
    align-items:center;
    gap:16px;
    flex-wrap:wrap;
  }
  h1{
    font-family:'Roboto Condensed',sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin:0;
    white-space:nowrap;
  }
  .search{
    flex:1;
    min-width:160px;
    background:var(--surface);
    border:1px solid var(--surface-2);
    border-radius:8px;
    padding:10px 14px;
    color:var(--text);
    font-family:'Roboto',sans-serif;
    font-size:14px;
  }
  .search::placeholder{ color:var(--text-dim); }
  .search:focus{ outline:none; border-color:var(--accent-dim); }

  main{
    padding:8px 20px 100px;
    max-width:1200px;
    margin:0 auto;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:20px;
  }
  @media (max-width: 600px){
    .grid{
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
    }
    .downloaded-badge{ width:16px; height:16px; }
    .downloaded-badge svg{ width:9px; height:9px; }
    .album{ font-size:11.5px; }
    .artist{ font-size:10.5px; }
  }

  .card{
    display:flex;
    flex-direction:column;
    gap:8px;
    cursor:default;
  }
  .cover-wrap{
    position:relative;
    aspect-ratio:1/1;
    border-radius:6px;
    overflow:hidden;
    background:var(--surface);
    border:1px solid var(--surface-2);
    transition:transform 0.15s ease;
  }
  .card:hover .cover-wrap{ transform:translateY(-2px); }
  .cover-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  /* not-downloaded = ghost sleeve: dashed border only, full color, no tag */
  .card.ghost .cover-wrap{
    border:1.5px dashed var(--ghost-border);
    background:var(--surface);
  }
  .downloaded-badge{
    position:absolute;
    top:6px;
    left:6px;
    width:20px;
    height:20px;
    border-radius:50%;
    background:rgba(20,17,13,0.85);
    border:1px solid var(--accent-dim);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .downloaded-badge svg{
    width:11px;
    height:11px;
    stroke:var(--accent);
  }

  .meta{ padding:0 2px; }
  .album{
    font-family:'Roboto Condensed',sans-serif;
    font-weight:600;
    font-size:14px;
    line-height:1.25;
    margin:0 0 2px;
  }
  .card.ghost .album{ color:var(--text-dim); }
  .artist{
    font-size:12.5px;
    color:var(--text-dim);
    margin:0;
  }
  .year{
    font-size:11px;
    color:var(--ghost-border);
    margin:2px 0 0;
  }

  .fab{
    position:fixed;
    right:24px;
    bottom:24px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:var(--accent);
    color:var(--bg);
    border:none;
    font-size:28px;
    font-weight:600;
    line-height:1;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,0.4);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .fab:hover{ background:#e6bb35; }

  .fab-row{
    position:fixed;
    right:24px;
    bottom:24px;
    display:flex;
    gap:12px;
    z-index:20;
  }
  .fab{ position:static; }
  .fab.trash{
    background:var(--surface);
    color:var(--text-dim);
    border:1px solid var(--surface-2);
  }
  .fab.trash svg{ width:22px; height:22px; }
  .fab.trash:hover{ background:var(--surface-2); color:var(--text); }
  .fab.trash.active{
    background:#B33A3A;
    color:#F3EDE0;
    border-color:#B33A3A;
  }

  .grid.delete-active .card{ cursor:pointer; }
  .grid.delete-active .card .cover-wrap{
    transition:border-color 0.12s ease, box-shadow 0.12s ease;
  }
  .grid.delete-active .card:hover .cover-wrap{
    border-color:#B33A3A;
    box-shadow:0 0 0 2px rgba(179,58,58,0.35);
    transform:none;
  }

  .delete-banner{
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:#B33A3A;
    color:#F3EDE0;
    font-family:'Roboto Condensed',sans-serif;
    font-size:13px;
    letter-spacing:0.03em;
    text-align:center;
    padding:8px 12px;
    z-index:30;
    display:none;
  }
  .delete-banner.show{ display:block; }

  .toast{
    position:fixed;
    left:50%;
    bottom:96px;
    transform:translateX(-50%) translateY(10px);
    background:var(--surface-2);
    color:var(--text);
    border:1px solid var(--ghost-border);
    padding:10px 16px;
    border-radius:8px;
    font-size:13px;
    z-index:200;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s ease, transform 0.2s ease;
    max-width:80vw;
    text-align:center;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  .toast.error{ border-color:#B33A3A; color:#E8B4B4; }

  .empty{
    text-align:center;
    color:var(--text-dim);
    padding:60px 20px;
    font-size:14px;
  }

  /* --- Launcher (add-album search) --- */
  .launcher-overlay{
    position:fixed;
    inset:0;
    background:rgba(10,8,6,0.6);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    z-index:100;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:12vh;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.15s ease;
  }
  .launcher-overlay.open{
    opacity:1;
    pointer-events:auto;
  }
  .launcher-box{
    width:min(520px, 90vw);
    background:var(--surface);
    border:1px solid var(--surface-2);
    border-radius:12px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    overflow:hidden;
    transform:translateY(-8px);
    transition:transform 0.15s ease;
  }
  .launcher-overlay.open .launcher-box{ transform:translateY(0); }
  .launcher-input{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--surface-2);
    color:var(--text);
    font-family:'Roboto',sans-serif;
    font-size:16px;
    padding:16px 18px;
  }
  .launcher-input::placeholder{ color:var(--text-dim); }
  .launcher-input:focus{ outline:none; }

  .launcher-results{
    max-height:50vh;
    overflow-y:auto;
  }
  .launcher-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 14px;
    cursor:pointer;
  }
  .launcher-item img{
    width:42px;
    height:42px;
    border-radius:4px;
    object-fit:cover;
    flex-shrink:0;
    background:var(--surface-2);
  }
  .launcher-item-text{ min-width:0; }
  .launcher-item .li-album{
    font-family:'Roboto Condensed',sans-serif;
    font-weight:600;
    font-size:13.5px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .launcher-item .li-artist{
    font-size:12px;
    color:var(--text-dim);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .launcher-item:hover,
  .launcher-item.active{
    background:var(--surface-2);
  }
  .launcher-hint{
    padding:12px 14px;
    font-size:12px;
    color:var(--text-dim);
    text-align:center;
  }
</style>
</head>
<body>

<header>
  <h1>Library</h1>
  <input class="search" type="text" placeholder="Search artist or album..." id="searchInput">
</header>

<div class="delete-banner" id="deleteBanner">Delete mode — tap an album to remove it. Tap the trash icon again to cancel.</div>

<main>
  <div class="grid" id="grid"></div>
  <p class="empty" id="emptyState" style="display:none;">No albums match your search.</p>
</main>

<div class="fab-row">
  <button class="fab trash" id="deleteModeBtn" title="Delete mode">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"></polyline>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
      <path d="M10 11v6"></path>
      <path d="M14 11v6"></path>
      <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
    </svg>
  </button>
  <button class="fab" id="addBtn" title="Add album">+</button>
</div>

<div class="toast" id="toast"></div>

<div class="launcher-overlay" id="launcherOverlay">
  <div class="launcher-box">
    <input class="launcher-input" id="launcherInput" type="text"
           placeholder="Search for an album to add..." autocomplete="off">
    <div class="launcher-results" id="launcherResults"></div>
  </div>
</div>

<script>
  // Register the service worker for image caching (also required for PWA installability).
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((err) => {
        console.error('Service worker registration failed:', err);
      });
    });
  }

  // Populated by loadLibrary() from the backend once a script ID is configured.
  let libraryData = [];

  function renderGrid(data){
    const grid = document.getElementById('grid');
    const empty = document.getElementById('emptyState');
    grid.innerHTML = '';

    if(data.length === 0){
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    data.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card' + (item.downloaded ? '' : ' ghost');
      card.dataset.artist = item.artist;
      card.dataset.album = item.album;

      const coverWrap = document.createElement('div');
      coverWrap.className = 'cover-wrap';

      const img = document.createElement('img');
      img.src = item.cover_art_url;
      img.alt = item.album + ' cover';
      img.loading = 'lazy';
      coverWrap.appendChild(img);

      if(item.downloaded){
        const badge = document.createElement('span');
        badge.className = 'downloaded-badge';
        badge.title = 'Downloaded';
        badge.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        coverWrap.appendChild(badge);
      }

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.innerHTML = `
        <p class="album">${escapeHtml(item.album)}</p>
        <p class="artist">${escapeHtml(item.artist)}</p>
        ${item.year ? `<p class="year">${item.year}</p>` : ''}
      `;

      card.appendChild(coverWrap);
      card.appendChild(meta);
      grid.appendChild(card);
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // --- Backend connection: deployment ID prompt + localStorage ---
  const LIBRARY_ID_KEY = 'libraryScriptId';

  function ensureLibraryId(){
    let id = localStorage.getItem(LIBRARY_ID_KEY);
    if(id) return id;

    const input = window.prompt(
      "Enter your Apps Script deployment ID or full /exec URL:"
    );
    if(!input) return null;

    // Accept either a bare ID or a full pasted URL and extract the ID either way.
    const match = input.match(/\/s\/([^\/]+)\/exec/);
    id = match ? match[1] : input.trim();

    localStorage.setItem(LIBRARY_ID_KEY, id);
    return id;
  }

  function getScriptUrl(){
    const id = localStorage.getItem(LIBRARY_ID_KEY);
    if(!id) return null;
    return `https://script.google.com/macros/s/${id}/exec`;
  }

  function buildPath(artist, album){
    return `/storage/emulated/0/musiclibrary/${artist}/${album}`;
  }

  async function loadLibrary(){
    const url = getScriptUrl();
    if(!url){
      showToast('No backend connected.', true);
      return;
    }
    try{
      const res = await fetch(url);
      const data = await res.json();
      libraryData = Array.isArray(data) ? data : [];
      renderGrid(libraryData);
    }catch(err){
      showToast('Could not load your library.', true);
    }
  }

  async function postAction(action, artist, album){
    const url = getScriptUrl();
    if(!url){
      showToast('No backend connected.', true);
      return null;
    }
    const path = buildPath(artist, album);
    const fullUrl = `${url}?action=${encodeURIComponent(action)}&path=${encodeURIComponent(path)}`;
    try{
      const res = await fetch(fullUrl, { method: 'POST' });
      return await res.json();
    }catch(err){
      showToast('Request failed. Check your connection.', true);
      return null;
    }
  }

  let toastTimer = null;
  function showToast(message, isError){
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.toggle('error', !!isError);
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // Client-side search/filter over whatever's currently loaded from the backend
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase().trim();
    const filtered = libraryData.filter(item =>
      item.artist.toLowerCase().includes(q) ||
      item.album.toLowerCase().includes(q)
    );
    renderGrid(filtered);
  });

  // --- Launcher: search iTunes to pick an album to add ---
  const overlay = document.getElementById('launcherOverlay');
  const launcherInput = document.getElementById('launcherInput');
  const launcherResults = document.getElementById('launcherResults');

  let itunesResults = [];
  let activeIndex = -1;
  let debounceTimer = null;

  function openLauncher(){
    overlay.classList.add('open');
    launcherInput.value = '';
    launcherResults.innerHTML = '';
    itunesResults = [];
    activeIndex = -1;
    setTimeout(() => launcherInput.focus(), 50);
  }

  function closeLauncher(){
    overlay.classList.remove('open');
  }

  document.getElementById('addBtn').addEventListener('click', openLauncher);

  overlay.addEventListener('click', (e) => {
    if(e.target === overlay) closeLauncher();
  });

  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && overlay.classList.contains('open')) closeLauncher();
  });

  launcherInput.addEventListener('input', (e) => {
    const query = e.target.value.trim();
    clearTimeout(debounceTimer);

    if(query.length === 0){
      launcherResults.innerHTML = '';
      itunesResults = [];
      activeIndex = -1;
      return;
    }

    debounceTimer = setTimeout(() => searchItunes(query), 300);
  });

  launcherInput.addEventListener('keydown', (e) => {
    if(itunesResults.length === 0) return;

    if(e.key === 'ArrowDown'){
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, itunesResults.length - 1);
      highlightActive();
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      highlightActive();
    } else if(e.key === 'Enter' && activeIndex >= 0){
      e.preventDefault();
      selectAlbum(itunesResults[activeIndex]);
    }
  });

  async function searchItunes(query){
    launcherResults.innerHTML = '<p class="launcher-hint">Searching...</p>';
    try{
      const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=8`;
      const res = await fetch(url);
      const data = await res.json();
      itunesResults = data.results || [];
      activeIndex = -1;
      renderLauncherResults();
    }catch(err){
      launcherResults.innerHTML = '<p class="launcher-hint">Search failed. Check your connection.</p>';
    }
  }

  function renderLauncherResults(){
    if(itunesResults.length === 0){
      launcherResults.innerHTML = '<p class="launcher-hint">No matches found.</p>';
      return;
    }
    launcherResults.innerHTML = '';
    itunesResults.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'launcher-item';
      row.innerHTML = `
        <img src="${item.artworkUrl100}" alt="">
        <div class="launcher-item-text">
          <p class="li-album">${escapeHtml(item.collectionName)}</p>
          <p class="li-artist">${escapeHtml(item.artistName)}</p>
        </div>
      `;
      row.addEventListener('click', () => selectAlbum(item));
      row.addEventListener('mouseenter', () => { activeIndex = i; highlightActive(); });
      launcherResults.appendChild(row);
    });
  }

  function highlightActive(){
    [...launcherResults.children].forEach((el, i) => {
      el.classList.toggle('active', i === activeIndex);
    });
  }

  async function selectAlbum(item){
    closeLauncher();
    showToast(`Adding "${item.collectionName}"...`);
    const result = await postAction('list', item.artistName, item.collectionName);
    if(!result) return;

    if(result.status === 'success'){
      showToast(`Added "${result.album}" by ${result.artist}.`);
    } else if(result.status === 'ignored'){
      showToast(`"${result.album}" is already in your library.`);
    } else {
      showToast(result.message || 'Something went wrong.', true);
    }
    loadLibrary();
  }

  // --- Delete mode ---
  const deleteModeBtn = document.getElementById('deleteModeBtn');
  const deleteBanner = document.getElementById('deleteBanner');
  const gridEl = document.getElementById('grid');
  let deleteMode = false;

  function toggleDeleteMode(){
    deleteMode = !deleteMode;
    deleteModeBtn.classList.toggle('active', deleteMode);
    deleteBanner.classList.toggle('show', deleteMode);
    gridEl.classList.toggle('delete-active', deleteMode);
  }

  deleteModeBtn.addEventListener('click', toggleDeleteMode);

  gridEl.addEventListener('click', async (e) => {
    if(!deleteMode) return;
    const card = e.target.closest('.card');
    if(!card) return;

    const { artist, album } = card.dataset;
    if(!window.confirm(`Remove "${album}" by ${artist} from your library?`)) return;

    showToast(`Removing "${album}"...`);
    const result = await postAction('remove', artist, album);
    if(!result) return;

    if(result.status === 'error'){
      showToast(result.message || 'Could not remove album.', true);
    } else {
      showToast(`Removed "${album}".`);
    }
    loadLibrary();
  });

  // --- Init ---
  async function init(){
    const id = ensureLibraryId();
    if(!id){
      showToast('No backend connected. Reload to try again.', true);
      renderGrid([]);
      return;
    }
    await loadLibrary();
  }

  init();
</script>

</body>
</html>
